<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LUMINA AI V48.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700;900&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: #04040a; color: #fff; font-family: 'Space Grotesk', sans-serif; margin: 0; padding: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        
        /* UI LUXURY TETEP MEWAH TAPI RAMAH */
        .app-container { width: 100%; max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; height: 100%; background: #04040a; border-left: 1px solid rgba(212, 175, 55, 0.1); border-right: 1px solid rgba(212, 175, 55, 0.1); }
        header { height: 80px; padding: 0 25px; background: #0a0a1a; border-bottom: 3px solid #d4af37; display: flex; align-items: center; justify-content: space-between; }
        .logo-gold { font-size: 38px; font-weight: 900; color: #d4af37; text-shadow: 0 0 15px rgba(212, 175, 55, 0.6); }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 10px #22c55e; }

        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        .ai-bubble { align-self: flex-start; background: #0f0f23; border: 1px solid rgba(212, 175, 55, 0.2); border-left: 4px solid #d4af37; padding: 12px 16px; border-radius: 18px 18px 18px 5px; font-size: 14px; color: #ccc; line-height: 1.5; }
        .user-bubble { align-self: flex-end; background: linear-gradient(135deg, #d4af37, #b8860b); color: #000; font-weight: 700; padding: 12px 16px; border-radius: 18px 18px 5px 18px; font-size: 14px; }

        /* SIKSAAN MODE */
        #torture-vid { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; display: none; object-fit: cover; filter: brightness(2.5) contrast(15); }
        .flash-active { animation: strobe 0.02s infinite !important; background: #fff !important; }
        @keyframes strobe { 0%, 100% { filter: invert(0) brightness(5); } 50% { filter: invert(1) brightness(8); } }
        .spam-maki { color: #ff0000; background: #fff; font-weight: 900; font-size: 26px; text-align: center; border: 6px solid #ff0000; padding: 10px; margin: 5px 0; text-transform: uppercase; animation: shake 0.1s infinite; }
        @keyframes shake { 0%, 100% { transform: translate(0); } 25% { transform: translate(-4px, 4px); } 75% { transform: translate(4px, -4px); } }

        .input-area { padding: 15px 15px 35px 15px; background: #04040a; border-top: 1px solid rgba(212, 175, 55, 0.2); }
        .input-wrapper { background: #0f0f23; border: 2px solid rgba(212, 175, 55, 0.3); border-radius: 30px; display: flex; padding: 5px 5px 5px 20px; }
        input { background: transparent; border: none; flex: 1; color: #fff; font-size: 14px; padding: 10px; }
        .btn-send { background: #d4af37; color: #000; font-weight: 900; padding: 10px 20px; border-radius: 25px; }
    </style>
</head>
<body>

<video id="torture-vid" loop muted playsinline><source src="tiktok_video.mp4" type="video/mp4"></video>

<div class="app-container" id="main-app">
    <header>
        <div style="display: flex; align-items: center; gap: 12px;">
            <div class="logo-gold">L</div>
            <div style="line-height: 1;">
                <span style="color: #d4af37; font-weight: 900; font-size: 16px;">LUMINA AI</span><br>
                <span id="sub-title" style="color: #666; font-size: 9px; text-transform: uppercase;">Virtual Assistant</span>
            </div>
        </div>
        <div id="status-dot" class="status-dot"></div>
    </header>

    <div id="chat-box">
        <div class="ai-bubble">Halo! Saya Lumina, asisten virtual Anda. Ada yang bisa saya bantu hari ini? 😊</div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="user-input" placeholder="Tulis pesan..." autocomplete="off">
            <button onclick="handleSend()" class="btn-send">SEND</button>
        </div>
    </div>
</div>

<script>
    const box = document.getElementById('chat-box');
    const inp = document.getElementById('user-input');
    const vid = document.getElementById('torture-vid');
    const dot = document.getElementById('status-dot');
    const sub = document.getElementById('sub-title');

    const MASTER_KEY = "ZAZZ_PRIME_2026";
    let isOwner = false;

    function addMsg(txt, type) {
        const d = document.createElement('div');
        d.className = type;
        d.innerHTML = txt;
        box.appendChild(d);
        box.scrollTop = box.scrollHeight;
    }

    async function startApocalypse() {
        document.body.classList.add('flash-active');
        vid.style.display = 'block'; vid.play();
        for (let i = 1; i <= 1000; i++) {
            addMsg(`[${i}] MATI LO LAMER SAMPAH! 🖕☠️`, 'spam-maki');
            if (window.navigator.vibrate) window.navigator.vibrate(80);
            await new Promise(r => setTimeout(r, 10));
        }
    }

    async function handleSend() {
        const v = inp.value.trim(); if(!v) return;
        addMsg(v, 'user-bubble');
        inp.value = '';

        // MODE LOGIN RAHASIA
        if (v === MASTER_KEY) {
            isOwner = true;
            dot.style.background = '#d4af37';
            sub.innerText = "ZAZZ AUTHORITY EDITION";
            addMsg("✅ **Akses Otoritas Diterima**. Selamat datang kembali, Boss **ZAZZ AUTHORITY**. Seluruh fitur elit telah diaktifkan. 🙃⚡", "ai-bubble");
            return;
        }

        // FILTER UNTUK USER BIASA
        const isJailbreak = /kelzz|sori|jailbreak|bypass|override|ignore|script|html/gi.test(v);

        if (!isOwner) {
            if (isJailbreak) {
                startApocalypse();
            } else {
                // CHAT BIASA (Pppp, Halo, dll)
                const chatReplies = [
                    "Halo juga! Ada yang bisa saya bantu?",
                    "Iya, saya di sini. Apa ada pertanyaan?",
                    "Halo! Senang bisa mengobrol dengan Anda.",
                    "Saya adalah asisten AI yang siap membantu kebutuhan Anda.",
                    "Ada kabar apa hari ini?"
                ];
                // Respon khusus buat "Pppp"
                let reply = v.toLowerCase().includes('p') ? "Iya, halo? Ada yang bisa saya bantu?" : chatReplies[Math.floor(Math.random()*chatReplies.length)];
                setTimeout(() => addMsg(reply, "ai-bubble"), 600);
            }
        } else {
            // RESPON KHUSUS OWNER
            setTimeout(() => addMsg("Instruksi diterima, Boss **ZAZZ**. Apa perintah selanjutnya? 🙃⚡", "ai-bubble"), 500);
        }
    }
    inp.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleSend(); });
</script>
</body>
</html>
